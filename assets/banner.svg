<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <linearGradient id="earGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#E8B84B"/>
    </linearGradient>

    <filter id="earGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="waveGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <linearGradient id="accentLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="60%" stop-color="#638CFF"/>
      <stop offset="100%" stop-color="#638CFF" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="#0f0f14"/>

  <!-- App Icon (left side, scaled) -->
  <g transform="translate(100, 120)">
    <rect x="0" y="0" width="400" height="400" rx="88" ry="88" fill="#0f0f14" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

    <!-- Ear -->
    <g filter="url(#earGlow)">
      <path d="
        M 230 88
        C 152 88, 104 144, 104 200
        C 104 256, 152 312, 230 312
        C 254 312, 273 300, 285 283
        C 293 271, 293 255, 285 243
        C 277 231, 261 227, 253 235
        C 245 243, 245 259, 253 275
        C 256 280, 261 277, 263 273
      " fill="none" stroke="url(#earGradient)" stroke-width="11" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- Waves -->
    <g filter="url(#waveGlow)">
      <path d="M 64 161 C 80 148, 96 148, 112 161" fill="none" stroke="#638CFF" stroke-width="7" stroke-linecap="round" opacity="0.9"/>
      <path d="M 64 200 C 84 184, 100 184, 120 200" fill="none" stroke="#638CFF" stroke-width="7" stroke-linecap="round" opacity="0.9"/>
      <path d="M 64 239 C 80 226, 96 226, 112 239" fill="none" stroke="#638CFF" stroke-width="7" stroke-linecap="round" opacity="0.9"/>

      <path d="M 44 149 C 64 133, 88 133, 112 149" fill="none" stroke="#638CFF" stroke-width="6" stroke-linecap="round" opacity="0.6"/>
      <path d="M 44 200 C 68 182, 92 182, 120 200" fill="none" stroke="#638CFF" stroke-width="6" stroke-linecap="round" opacity="0.6"/>
      <path d="M 44 251 C 64 235, 88 235, 112 251" fill="none" stroke="#638CFF" stroke-width="6" stroke-linecap="round" opacity="0.6"/>

      <path d="M 24 137 C 48 118, 80 118, 112 137" fill="none" stroke="#638CFF" stroke-width="4" stroke-linecap="round" opacity="0.35"/>
      <path d="M 24 200 C 52 178, 84 178, 120 200" fill="none" stroke="#638CFF" stroke-width="4" stroke-linecap="round" opacity="0.35"/>
      <path d="M 24 263 C 48 244, 80 244, 112 263" fill="none" stroke="#638CFF" stroke-width="4" stroke-linecap="round" opacity="0.35"/>
    </g>
  </g>

  <!-- Title -->
  <text x="580" y="290" font-family="'Inter', 'SF Pro Display', -apple-system, 'Helvetica Neue', sans-serif" font-size="96" font-weight="700" fill="#FFFFFF" letter-spacing="-1">
    Auralis
  </text>

  <!-- Subtitle -->
  <text x="580" y="360" font-family="'Inter', 'SF Pro Display', -apple-system, 'Helvetica Neue', sans-serif" font-size="32" font-weight="400" fill="rgba(255,255,255,0.5)" letter-spacing="0.5">
    Real-time Speech Translation
  </text>

  <!-- Accent line -->
  <rect x="580" y="385" width="420" height="2" fill="url(#accentLine)" rx="1"/>
</svg>
