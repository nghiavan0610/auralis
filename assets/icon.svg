<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Ear outline gradient: gold -->
    <linearGradient id="earGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#E8B84B"/>
    </linearGradient>

    <!-- Sound wave gradient: blue -->
    <linearGradient id="waveGradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#638CFF" stop-opacity="0"/>
      <stop offset="30%" stop-color="#638CFF" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#638CFF"/>
    </linearGradient>

    <!-- Subtle glow for the ear -->
    <filter id="earGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Glow for waves -->
    <filter id="waveGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Radial aura behind ear -->
    <radialGradient id="aura" cx="55%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#FFD700" stop-opacity="0.08"/>
      <stop offset="60%" stop-color="#638CFF" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#638CFF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background squircle -->
  <rect x="0" y="0" width="1024" height="1024" rx="224" ry="224" fill="#0f0f14"/>

  <!-- Subtle aura glow -->
  <ellipse cx="540" cy="512" rx="320" ry="280" fill="url(#aura)"/>

  <!-- Abstract ear outline — gold, flowing curve -->
  <g filter="url(#earGlow)">
    <path d="
      M 580 220
      C 380 220, 260 360, 260 512
      C 260 664, 380 804, 580 804
      C 640 804, 690 774, 720 730
      C 740 700, 740 660, 720 630
      C 700 600, 660 590, 640 610
      C 620 630, 620 670, 640 700
      C 648 712, 660 706, 665 695
    " fill="none" stroke="url(#earGradient)" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Sound waves flowing INTO the ear — blue arcs -->
  <g filter="url(#waveGlow)">
    <!-- Wave 1 (closest to ear) -->
    <path d="
      M 160 412
      C 200 380, 240 380, 280 412
    " fill="none" stroke="#638CFF" stroke-width="16" stroke-linecap="round" opacity="0.9"/>

    <path d="
      M 160 512
      C 210 472, 250 472, 300 512
    " fill="none" stroke="#638CFF" stroke-width="16" stroke-linecap="round" opacity="0.9"/>

    <path d="
      M 160 612
      C 200 580, 240 580, 280 612
    " fill="none" stroke="#638CFF" stroke-width="16" stroke-linecap="round" opacity="0.9"/>

    <!-- Wave 2 (middle) -->
    <path d="
      M 110 382
      C 160 340, 220 340, 280 382
    " fill="none" stroke="#638CFF" stroke-width="14" stroke-linecap="round" opacity="0.6"/>

    <path d="
      M 110 512
      C 170 462, 230 462, 300 512
    " fill="none" stroke="#638CFF" stroke-width="14" stroke-linecap="round" opacity="0.6"/>

    <path d="
      M 110 642
      C 160 600, 220 600, 280 642
    " fill="none" stroke="#638CFF" stroke-width="14" stroke-linecap="round" opacity="0.6"/>

    <!-- Wave 3 (outermost, faintest) -->
    <path d="
      M 60 352
      C 120 300, 200 300, 280 352
    " fill="none" stroke="#638CFF" stroke-width="10" stroke-linecap="round" opacity="0.35"/>

    <path d="
      M 60 512
      C 130 452, 210 452, 300 512
    " fill="none" stroke="#638CFF" stroke-width="10" stroke-linecap="round" opacity="0.35"/>

    <path d="
      M 60 672
      C 120 620, 200 620, 280 672
    " fill="none" stroke="#638CFF" stroke-width="10" stroke-linecap="round" opacity="0.35"/>
  </g>
</svg>
